<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFC93C"/>
      <stop offset="50%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E89200"/>
    </linearGradient>
    <linearGradient id="textShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Sun (half circle) -->
  <path d="M 110 175 A 90 90 0 0 1 290 175 Z" fill="url(#sunGrad)"/>
  <!-- Sun ray lines (horizontal cuts) -->
  <rect x="80" y="155" width="240" height="6" fill="#ffffff" opacity="0.85"/>
  <rect x="100" y="138" width="200" height="5" fill="#ffffff" opacity="0.7"/>
  <rect x="120" y="125" width="160" height="4" fill="#ffffff" opacity="0.6"/>

  <!-- Birds (upper left) -->
  <path d="M 75 80 Q 90 70 105 80 Q 90 75 75 80 Z" fill="#1a1a1a"/>
  <path d="M 105 80 Q 120 70 135 80 Q 120 75 105 80 Z" fill="#1a1a1a"/>
  <path d="M 130 95 Q 145 85 160 95 Q 145 90 130 95 Z" fill="#1a1a1a"/>

  <!-- Horizon arc -->
  <path d="M 60 195 Q 200 215 340 195" stroke="#F5A623" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 80 205 Q 200 222 320 205" stroke="#E89200" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- IMAGINE text -->
  <text x="200" y="265" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900" letter-spacing="2" text-anchor="middle" fill="url(#textShine)">IMAGINE</text>

  <!-- TRAVEL text with side lines -->
  <line x1="115" y1="293" x2="155" y2="293" stroke="#F5A623" stroke-width="2"/>
  <text x="200" y="298" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="6" text-anchor="middle" fill="#1a1a1a">TRAVEL</text>
  <line x1="245" y1="293" x2="285" y2="293" stroke="#F5A623" stroke-width="2"/>
</svg>
