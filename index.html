<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Hotel Voucher | اليامي</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Hotel Voucher"/>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='28' fill='%230f172a'/><text x='96' y='110' font-size='80' text-anchor='middle' fill='%23C5A059' font-family='serif' font-weight='700'>H</text></svg>"/>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:0;background:#f0f2f5;color:#222}
  body[data-lang="ar"]{font-family:'Cairo','Tahoma','Segoe UI',sans-serif;direction:rtl}
  body[data-lang="en"]{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;direction:ltr}
  .app{max-width:1100px;margin:0 auto;padding:16px}
  h1{font-size:20px;margin:8px 0 16px;text-align:center;color:#0f172a}

  .panel{background:#fff;border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}
  .grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
  label{display:block;font-size:13px;margin-bottom:4px;color:#444}
  input,select{width:100%;padding:9px 10px;border:1px solid #cfd4da;border-radius:6px;font-size:14px;background:#fff;font-family:inherit}
  input:focus,select:focus{outline:2px solid #0f172a33;border-color:#0f172a}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center}
  button{padding:10px 18px;border:0;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
  .btn-primary{background:#0f172a;color:#C5A059}
  .btn-secondary{background:#6c757d;color:#fff}
  .btn-print{background:#198754;color:#fff}
  button:hover{opacity:.9}

  .lang-switch{display:inline-flex;background:#eef0f3;border-radius:8px;padding:3px;gap:2px;margin-inline-start:auto}
  .lang-switch button{padding:7px 18px;border-radius:6px;background:transparent;color:#666;font-size:13px;font-weight:700}
  .lang-switch button.active{background:#0f172a;color:#C5A059;box-shadow:0 1px 4px rgba(0,0,0,.15)}

  /* ===== A4 Voucher (compact, single page) ===== */
  .doc-wrap{display:flex;justify-content:center;padding:20px 0}
  .voucher{
    width:210mm;height:297mm;padding:12mm 14mm 18mm;background:#fff;position:relative;
    color:#1a1a1a;font-size:10.5px;line-height:1.45;
    box-shadow:0 4px 18px rgba(0,0,0,.12);overflow:hidden;
  }
  .voucher[data-lang="ar"]{direction:rtl;font-family:'Cairo','Tahoma','Segoe UI',sans-serif}
  .voucher[data-lang="en"]{direction:ltr;font-family:'Cambria','Georgia','Times New Roman',serif}

  .v-topband{position:absolute;top:0;left:0;right:0;height:3mm;background:linear-gradient(to right,#0f172a 0%,#0f172a 40%,#C5A059 40%,#C5A059 60%,#0f172a 60%,#0f172a 100%)}

  .v-letterhead{display:flex;align-items:center;justify-content:space-between;gap:5mm;margin-top:4mm;padding-bottom:3mm;border-bottom:2px solid #0f172a;position:relative}
  .v-letterhead::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:#C5A059}
  .v-logo-side{flex-shrink:0;display:flex;flex-direction:column;align-items:center}
  .v-logo-img{width:140px;height:140px;object-fit:contain}
  .v-co-block{flex:1;text-align:center;padding:0 3mm}
  .v-co-name{font-size:17px;font-weight:700;color:#0f172a;letter-spacing:.5px;margin:0 0 1mm}
  .voucher[data-lang="en"] .v-co-name{font-family:'Times New Roman',serif;letter-spacing:2px}
  .v-co-sub{font-size:9px;color:#C5A059;font-weight:600;letter-spacing:1.5px;margin-bottom:1.5mm;text-transform:uppercase}
  .v-co-partner{font-size:8px;color:#666;font-style:italic;margin-bottom:2mm;letter-spacing:.5px}
  .v-co-contact{font-size:8.5px;color:#444;line-height:1.5}
  .v-co-contact .row{display:flex;align-items:center;justify-content:center;gap:4px;margin:.5mm 0;flex-wrap:wrap}
  .v-co-contact svg{width:9px;height:9px;fill:#0f172a;flex-shrink:0}
  .v-co-contact .label{font-weight:700;color:#0f172a;display:inline-block}
  .v-co-contact .phone-list{display:flex;flex-wrap:wrap;gap:0 6px;direction:ltr}

  .v-title{text-align:center;margin:3mm 0 2mm}
  .v-title .t-pill{display:inline-block;background:#0f172a;color:#C5A059;padding:1mm 6mm;font-size:9px;font-weight:700;letter-spacing:3px;border-radius:2px;margin-bottom:1.5mm;text-transform:uppercase}
  .v-title h2{margin:0;font-size:22px;letter-spacing:3px;color:#0f172a;font-weight:700}
  .voucher[data-lang="en"] .v-title h2{font-family:'Times New Roman',serif}
  .v-title .deco{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:1.5mm}
  .v-title .deco span{height:1px;width:30mm;background:linear-gradient(to right,transparent,#C5A059,transparent)}
  .v-title .deco .dot{width:4px;height:4px;background:#C5A059;transform:rotate(45deg)}

  .v-meta{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:3mm;margin:3mm 0;padding:2.5mm 4mm;background:#0f172a;color:#fff;border-radius:2px}
  .v-meta .item{display:flex;flex-direction:column;gap:.5mm}
  .v-meta .lbl{font-size:7px;color:#C5A059;letter-spacing:1.2px;text-transform:uppercase;font-weight:600}
  .v-meta .val{font-size:10.5px;font-weight:700;color:#fff}
  .v-meta .center{text-align:center}
  .v-meta .right{text-align:right}
  .voucher[data-lang="en"] .v-meta .right{text-align:left}
  .status-badge{display:inline-block;background:#C5A059;color:#0f172a;padding:2.5px 12px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .status-pending{background:#f59e0b;color:#fff}
  .status-cancelled{background:#dc2626;color:#fff}

  .v-hotel{display:flex;gap:4mm;align-items:center;padding:3.5mm 4mm;background:linear-gradient(135deg,#fafafa 0%,#fff 100%);border:1px solid #e5e0d0;margin:3mm 0}
  .voucher[data-lang="ar"] .v-hotel{border-right:4px solid #C5A059}
  .voucher[data-lang="en"] .v-hotel{border-left:4px solid #C5A059}
  .v-hotel-icon{width:14mm;height:14mm;background:#0f172a;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .v-hotel-icon svg{width:8mm;height:8mm;fill:#C5A059}
  .v-hotel-body{flex:1}
  .v-hotel-lbl{font-size:8px;color:#888;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:.8mm;font-weight:600}
  .v-hotel-name{font-size:15px;font-weight:700;color:#0f172a;margin:0;line-height:1.2}
  .voucher[data-lang="en"] .v-hotel-name{font-family:'Times New Roman',serif}
  .v-hotel-loc{font-size:10px;color:#555;margin-top:1mm;display:flex;align-items:center;gap:4px}
  .v-hotel-loc svg{width:10px;height:10px;fill:#C5A059;flex-shrink:0}

  .section-title{font-weight:700;font-size:10px;margin:3.5mm 0 1.5mm;color:#0f172a;letter-spacing:1.8px;text-transform:uppercase;padding-bottom:1mm;border-bottom:1px solid #C5A059;display:flex;align-items:center;gap:2.5mm}
  .section-title::before{content:'';width:2.5mm;height:2.5mm;background:#C5A059;transform:rotate(45deg);flex-shrink:0}

  table.doc-table{width:100%;border-collapse:collapse;margin-bottom:1.5mm;page-break-inside:avoid}
  table.doc-table td{border:1px solid #d4d0c0;padding:2mm 3mm;vertical-align:middle;font-size:10px}
  .label-cell{background:#f5f2e8;font-weight:700;width:22%;color:#0f172a;font-size:8.5px;letter-spacing:.4px;text-transform:uppercase}
  .value-cell{background:#fff;color:#1a1a1a;font-weight:500;font-size:10.5px}

  .v-sigfooter{
    margin-top:4mm;display:grid;
    grid-template-columns:1fr auto auto;gap:6mm;
    padding:4mm 5mm;border:1px solid #e5e0d0;
    background:linear-gradient(135deg,#fcfaf4 0%,#fafafa 50%,#f5f2e8 100%);
    page-break-inside:avoid;align-items:center;
    border-radius:2px;position:relative;
  }
  .v-sigfooter::before{content:'';position:absolute;top:0;left:5mm;right:5mm;height:2px;background:linear-gradient(to right,transparent,#C5A059,transparent)}
  .v-issued{min-width:0}
  .v-issued .lbl{font-size:8px;color:#888;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1.5mm;font-weight:700}
  .v-issued .val{font-size:14px;color:#0f172a;font-weight:700;margin-bottom:1mm;letter-spacing:.3px}
  .v-issued-email{font-size:9px;color:#555;margin-bottom:2.5mm;direction:ltr;text-align:start;font-family:'Consolas','Courier New',monospace;letter-spacing:.2px}
  .voucher[data-lang="ar"] .v-issued-email{text-align:right}
  .v-issued .sig-line{border-top:1.5px solid #0f172a;width:50mm;padding-top:1mm;font-size:8px;color:#666;font-style:italic;letter-spacing:.5px}

  .v-stamp{display:flex;align-items:center;justify-content:center;padding:0 2mm}
  .stamp-circle{
    width:24mm;height:24mm;border:2.5px solid #C5A059;border-radius:50%;
    display:flex;align-items:center;justify-content:center;position:relative;
    transform:rotate(-10deg);
    background:radial-gradient(circle,#fffbf3 0%,#fff 100%);
  }
  .stamp-circle::before{content:'';position:absolute;inset:2mm;border:1px dashed #C5A059;border-radius:50%}
  .stamp-inner{text-align:center;color:#C5A059}
  .stamp-co{font-size:10px;font-weight:800;letter-spacing:2px;line-height:1}
  .stamp-sub{font-size:6.5px;font-weight:600;letter-spacing:2.5px;margin-top:1.5mm}

  .v-qr{text-align:center;display:flex;flex-direction:column;align-items:center;gap:1mm}
  .v-qr canvas{width:24mm;height:24mm;border:1.5px solid #0f172a;padding:1mm;background:#fff;display:block;border-radius:2px}
  .v-qr p{font-size:7.5px;color:#0f172a;margin:0;line-height:1.3;letter-spacing:.5px;font-weight:700;text-transform:uppercase}

  .notes{
    margin-top:3mm;border:1px solid #e0d8c0;padding:3mm 4mm;
    background:linear-gradient(to bottom,#fffbf3 0%,#fff 100%);
    page-break-inside:avoid;border-radius:2px;position:relative;
  }
  .voucher[data-lang="ar"] .notes{border-right:3px solid #C5A059}
  .voucher[data-lang="en"] .notes{border-left:3px solid #C5A059}
  .notes h4{
    margin:0 0 1.5mm;font-size:9px;color:#0f172a;letter-spacing:1.5px;
    text-transform:uppercase;padding-bottom:1mm;
    border-bottom:1px solid #C5A05955;display:flex;align-items:center;gap:2mm;
  }
  .notes h4::before{content:'';width:2mm;height:2mm;background:#C5A059;transform:rotate(45deg);flex-shrink:0}
  .notes ol{margin:0;padding-inline-start:4mm;font-size:8.5px;line-height:1.55;color:#333;counter-reset:item}
  .notes li{margin:.6mm 0;padding-inline-start:1mm}
  .notes li::marker{color:#C5A059;font-weight:700}

  .v-docfooter{position:absolute;bottom:0;left:0;right:0;padding:0 14mm 5mm}
  .v-docfooter-deco{
    display:flex;align-items:center;justify-content:center;gap:6px;
    margin-bottom:2mm;
  }
  .v-docfooter-deco .line{flex:1;height:1px;background:linear-gradient(to right,transparent 0%,#C5A059 50%,transparent 100%)}
  .v-docfooter-deco .diamond{width:5px;height:5px;background:#C5A059;transform:rotate(45deg)}
  .v-docfooter-deco .dot{width:3px;height:3px;background:#0f172a;border-radius:50%}
  .v-docfooter-row{
    display:grid;grid-template-columns:1fr auto 1fr;gap:4mm;
    align-items:center;font-size:8.5px;color:#555;padding:1mm 0 2mm;
  }
  .v-docfooter strong{color:#0f172a;font-weight:700}
  .v-docfooter .seal{
    font-size:9px;letter-spacing:1.5px;color:#0f172a;font-weight:800;
    padding:1mm 3mm;border:1px solid #C5A059;border-radius:1mm;
    background:#fffbf3;text-align:center;
  }
  .v-docfooter .center{
    font-size:8px;color:#666;text-align:center;letter-spacing:.6px;
    direction:ltr;font-family:'Consolas','Courier New',monospace;
  }
  .v-docfooter .left{text-align:start;line-height:1.5}
  .voucher[data-lang="ar"] .v-docfooter .left{font-family:'Cairo',sans-serif}
  .v-docfooter-bar{height:2.5mm;background:linear-gradient(to right,#0f172a 0%,#0f172a 30%,#C5A059 30%,#C5A059 70%,#0f172a 70%,#0f172a 100%);border-radius:1px}

  .watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:.04;font-size:110px;font-weight:800;color:#0f172a;transform:rotate(-25deg);letter-spacing:8px;font-family:'Times New Roman',serif;z-index:0}
  .voucher > *:not(.watermark):not(.v-topband){position:relative;z-index:1}

  @media print{
    body{background:#fff;margin:0;padding:0}
    .panel,h1,.no-print{display:none!important}
    .doc-wrap{padding:0;display:block}
    .voucher{box-shadow:none;margin:0;width:210mm;height:297mm;page-break-after:avoid}
    @page{size:A4;margin:0}
    *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
    .v-meta,.v-hotel,.v-sigfooter,.notes,table.doc-table,.v-letterhead{page-break-inside:avoid}
  }

  @media (max-width:768px){
    .voucher{width:100%;min-height:auto;padding:8mm}
    .v-topband{height:4mm}
    .v-letterhead{flex-direction:column;text-align:center;gap:4mm}
    .v-logo-img{width:100px;height:100px}
    .v-title h2{font-size:22px;letter-spacing:2px}
    .v-meta{grid-template-columns:1fr;gap:2mm;padding:3mm}
    .v-hotel{flex-direction:column;text-align:center;gap:3mm}
    table.doc-table td{padding:2mm 3mm;font-size:10.5px}
    .label-cell{font-size:9px}
    .v-sigfooter{flex-direction:column;align-items:stretch}
    .v-docfooter{position:static;flex-direction:column;gap:2mm;margin-top:6mm}
  }
</style>
</head>
<body data-lang="ar">
<div class="app">
  <h1 class="no-print" id="ui_title">نظام إصدار قسائم الحجز الفندقي</h1>

  <div class="panel no-print">
    <div class="grid">
      <div><label id="lbl_ref">مرجع القسيمة</label><input id="ref" placeholder="MR-2026-0001"/></div>
      <div><label id="lbl_confirm">رقم التأكيد من الفندق</label><input id="confirm" placeholder="HTL-CONF-XXXXXX"/></div>
      <div><label id="lbl_status">الحالة</label>
        <select id="status">
          <option value="confirmed" id="opt_confirmed">مؤكد</option>
          <option value="pending" id="opt_pending">قيد المراجعة</option>
          <option value="cancelled" id="opt_cancelled">ملغي</option>
        </select>
      </div>
      <div><label id="lbl_hotel_in">اسم الفندق</label><input id="hotel"/></div>
      <div><label id="lbl_loc_in">الموقع</label><input id="loc"/></div>
      <div><label id="lbl_guest_in">اسم العميل</label><input id="guest"/></div>
      <div><label id="lbl_room_in">نوع الغرفة</label><input id="room"/></div>
      <div><label id="lbl_checkin_in">تاريخ الدخول</label><input id="checkin" type="date"/></div>
      <div><label id="lbl_checkout_in">تاريخ الخروج</label><input id="checkout" type="date"/></div>
      <div><label id="lbl_nights_in">عدد الليالي</label><input id="nights" type="number" min="1"/></div>
      <div><label id="lbl_meals_in">الوجبات</label><input id="meals"/></div>
      <div><label id="lbl_issuer_in">الموظف المختص</label>
        <select id="issuer">
          <option value="Basent">Basent</option>
          <option value="Marwa">Marwa</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="btn_gen" onclick="generate()">توليد القسيمة</button>
      <button class="btn-print" id="btn_print" onclick="window.print()">طباعة / PDF</button>
      <button class="btn-secondary" id="btn_reset" onclick="resetForm()">مسح</button>
      <button id="btnInstall" class="btn-primary" style="display:none;background:#198754;color:#fff" onclick="installApp()">📲 تثبيت</button>
      <div class="lang-switch">
        <button id="btnAr" class="active" onclick="setLang('ar')">العربية</button>
        <button id="btnEn" onclick="setLang('en')">English</button>
      </div>
    </div>
  </div>

  <div class="doc-wrap">
    <div class="voucher" id="doc" data-lang="ar">
      <div class="v-topband"></div>
      <div class="watermark" id="d_watermark">ALYAME</div>

      <div class="v-letterhead">
        <div class="v-logo-side primary">
          <img src="logo.png" alt="Alyame Travel" class="v-logo-img"/>
        </div>
        <div class="v-co-block">
          <h3 class="v-co-name" id="d_co_name"></h3>
          <div class="v-co-sub" id="d_co_sub"></div>
          <div class="v-co-partner" id="d_partner_label"></div>
          <div class="v-co-contact">
            <div class="row">
              <svg viewBox="0 0 24 24"><path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57-.35-.11-.74-.03-1.02.25l-2.2 2.2c-2.83-1.44-5.15-3.75-6.59-6.58l2.2-2.21c.28-.27.36-.66.25-1.01C8.7 6.45 8.5 5.25 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1z"/></svg>
              <span class="label" id="d_lbl_libya"></span>
              <span class="phone-list"><span>+218 91 325 7652</span></span>
            </div>
            <div class="row">
              <svg viewBox="0 0 24 24"><path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57-.35-.11-.74-.03-1.02.25l-2.2 2.2c-2.83-1.44-5.15-3.75-6.59-6.58l2.2-2.21c.28-.27.36-.66.25-1.01C8.7 6.45 8.5 5.25 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1z"/></svg>
              <span class="label" id="d_lbl_egypt"></span>
              <span class="phone-list">
                <span>+20 110 110 9022</span><span>· +20 101 785 7655</span><span>· +20 114 337 7200</span>
              </span>
            </div>
            <div class="row">
              <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
              <span>info@alyametravel.com</span>
            </div>
          </div>
        </div>
        <div class="v-logo-side partner">
          <img src="imagine-logo.svg" alt="Imagine Travel" class="v-logo-img"/>
        </div>
      </div>

      <div class="v-title">
        <div class="t-pill" id="d_pill"></div>
        <h2 id="d_title"></h2>
        <div class="deco"><span></span><span class="dot"></span><span></span></div>
      </div>

      <div class="v-meta">
        <div class="item">
          <span class="lbl" id="d_lbl_ref"></span>
          <span class="val" id="d_ref_top">—</span>
        </div>
        <div class="item">
          <span class="lbl" id="d_lbl_confirm"></span>
          <span class="val" id="d_confirm">—</span>
        </div>
        <div class="item center">
          <span class="lbl" id="d_lbl_status"></span>
          <span id="d_status" class="status-badge">—</span>
        </div>
        <div class="item right">
          <span class="lbl" id="d_lbl_date"></span>
          <span class="val" id="d_date">—</span>
        </div>
      </div>

      <div class="v-hotel">
        <div class="v-hotel-icon">
          <svg viewBox="0 0 24 24"><path d="M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z"/></svg>
        </div>
        <div class="v-hotel-body">
          <div class="v-hotel-lbl" id="d_lbl_hotel"></div>
          <p class="v-hotel-name" id="d_hotel">—</p>
          <p class="v-hotel-loc">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            <span id="d_loc">—</span>
          </p>
        </div>
      </div>

      <div class="section-title" id="d_sec_guest"></div>
      <table class="doc-table">
        <tr>
          <td class="label-cell" id="d_lbl_guest"></td>
          <td class="value-cell" colspan="3" id="d_guest">—</td>
        </tr>
      </table>

      <div class="section-title" id="d_sec_booking"></div>
      <table class="doc-table">
        <tr>
          <td class="label-cell" id="d_lbl_checkin"></td>
          <td class="value-cell" id="d_checkin">—</td>
          <td class="label-cell" id="d_lbl_checkout"></td>
          <td class="value-cell" id="d_checkout">—</td>
        </tr>
        <tr>
          <td class="label-cell" id="d_lbl_nights"></td>
          <td class="value-cell" id="d_nights">—</td>
          <td class="label-cell" id="d_lbl_room"></td>
          <td class="value-cell" id="d_room">—</td>
        </tr>
        <tr>
          <td class="label-cell" id="d_lbl_meals"></td>
          <td class="value-cell" colspan="3" id="d_meals">—</td>
        </tr>
      </table>

      <div class="v-sigfooter">
        <div class="v-issued">
          <div class="lbl" id="d_lbl_issuer"></div>
          <div class="val" id="d_issuer">—</div>
          <div class="v-issued-email" id="d_issuer_email"></div>
          <div class="sig-line" id="d_lbl_sig"></div>
        </div>
        <div class="v-stamp">
          <div class="stamp-circle">
            <div class="stamp-inner">
              <div class="stamp-co" id="d_stamp_co">ALYAME</div>
              <div class="stamp-sub" id="d_stamp_sub">OFFICIAL</div>
            </div>
          </div>
        </div>
        <div class="v-qr">
          <canvas id="qr"></canvas>
          <p id="d_lbl_qr"></p>
        </div>
      </div>

      <div class="notes">
        <h4 id="d_lbl_notes"></h4>
        <ol id="d_notes"></ol>
      </div>

      <div class="v-docfooter">
        <div class="v-docfooter-deco">
          <span class="line"></span>
          <span class="dot"></span>
          <span class="diamond"></span>
          <span class="dot"></span>
          <span class="line"></span>
        </div>
        <div class="v-docfooter-row">
          <div class="left" id="d_footer_left"></div>
          <div class="seal" id="d_footer_right"></div>
          <div class="center" id="d_footer_center"></div>
        </div>
        <div class="v-docfooter-bar"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let lang = 'ar';

  // Per-language data store (so switching preserves what was typed in other lang)
  const store = { ar: {}, en: {} };
  const TEXT_FIELDS = ['hotel','loc','guest','room','meals'];
  const SHARED_FIELDS = ['ref','confirm','status','checkin','checkout','nights','issuer'];

  // Staff emails (Imagine Travel operations)
  const STAFF_EMAIL = {
    Basent: 'Operation2@imaginetravelegypt.com',
    Marwa: 'Operation3@imaginetravelegypt.com'
  };

  const T = {
    ar: {
      page_title: 'نظام إصدار قسائم الحجز الفندقي',
      form: {
        ref:'مرجع القسيمة', confirm:'رقم التأكيد من الفندق', status:'الحالة',
        hotel:'اسم الفندق', loc:'الموقع', guest:'اسم العميل',
        room:'نوع الغرفة', checkin:'تاريخ الدخول', checkout:'تاريخ الخروج',
        nights:'عدد الليالي', meals:'الوجبات', issuer:'الموظف المختص',
        gen:'توليد القسيمة', print:'طباعة / PDF', reset:'مسح', install:'📲 تثبيت'
      },
      placeholders: {
        ref:'MR-2026-0001', confirm:'HTL-CONF-XXXXXX',
        hotel:'فندق ريجنسي بالاس', loc:'طريق الملك فهد، الرياض',
        guest:'محمد أحمد علي', room:'جناح ملكي', meals:'إقامة شاملة', nights:'تلقائي'
      },
      status_opt: { confirmed:'مؤكد', pending:'قيد المراجعة', cancelled:'ملغي' },
      doc: {
        co_name: 'اليامي للسفر والسياحة',
        co_sub: 'خدمات السفر والسياحة',
        partner: 'بشراكة مع Imagine Travel · مشغّل الحجوزات',
        tag_primary: 'شركة الإصدار',
        tag_partner: 'شريك التشغيل',
        libya: 'ليبيا:', egypt: 'مصر:',
        pill: 'وثيقة رسمية',
        title: 'قسيمة حجز فندقي',
        ref: 'المرجع', confirm: 'رقم التأكيد', status: 'الحالة', date: 'تاريخ الإصدار',
        hotel: 'الفندق',
        sec_guest: 'معلومات العميل', sec_booking: 'تفاصيل الحجز',
        guest: 'اسم العميل', checkin: 'تاريخ الدخول', checkout: 'تاريخ الخروج',
        nights_l: 'عدد الليالي', room: 'نوع الغرفة', meals: 'الوجبات',
        issuer: 'صادرة عن', sig: 'التوقيع المعتمد',
        qr: 'امسح للتحقق',
        notes: 'إشعارات هامة',
        footer_left: '<strong>اليامي للسفر والسياحة</strong> · هذه الوثيقة صادرة إلكترونياً ولا تحتاج إلى توقيع',
        footer_right: 'اليامي · 2026 ©',
        status_map: { confirmed:'مؤكد', pending:'قيد المراجعة', cancelled:'ملغي' },
        nights_fmt: n => `${n} ${n===1?'ليلة':n===2?'ليلتان':'ليالي'}`,
        notes_list: [
          'يُرجى تقديم هذه القسيمة مع هوية شخصية سارية عند الوصول إلى الفندق.',
          'وقت الدخول القياسي 2 ظهراً · الخروج 12 ظهراً (حسب سياسة الفندق).',
          'في بعض الحجوزات، أي تعديل أو إلغاء يجب أن يتم قبل 48 ساعة من تاريخ الدخول على الأقل.',
          'هذه القسيمة غير قابلة للتحويل وصالحة فقط للعميل المذكور.',
          'بعض الحجوزات غير مستردّة القيمة بعد إصدار الفاوتشر.'
        ]
      }
    },
    en: {
      page_title: 'Hotel Voucher Issuing System',
      form: {
        ref:'Voucher Reference', confirm:'Hotel Confirmation No.', status:'Status',
        hotel:'Hotel Name', loc:'Location', guest:'Guest Name',
        room:'Room Type', checkin:'Check-in Date', checkout:'Check-out Date',
        nights:'Nights', meals:'Meals', issuer:'Issued By',
        gen:'Generate Voucher', print:'Print / PDF', reset:'Reset', install:'📲 Install'
      },
      placeholders: {
        ref:'MR-2026-0001', confirm:'HTL-CONF-XXXXXX',
        hotel:'Regency Palace Hotel', loc:'King Fahd Rd, Riyadh',
        guest:'Mohammed Ahmed Ali', room:'Royal Suite', meals:'All Inclusive', nights:'Auto'
      },
      status_opt: { confirmed:'Confirmed', pending:'Pending', cancelled:'Cancelled' },
      doc: {
        co_name: 'ALYAME TRAVEL & TOURISM',
        co_sub: 'Travel & Tourism Services',
        partner: 'In partnership with Imagine Travel · Booking Operator',
        tag_primary: 'Issuing Company',
        tag_partner: 'Operations Partner',
        libya: 'Libya:', egypt: 'Egypt:',
        pill: 'Official Document',
        title: 'HOTEL VOUCHER',
        ref: 'Voucher Ref', confirm: 'Confirmation No.', status: 'Status', date: 'Issue Date',
        hotel: 'Hotel',
        sec_guest: 'Guest Information', sec_booking: 'Booking Details',
        guest: 'Guest Name', checkin: 'Check-in', checkout: 'Check-out',
        nights_l: 'Nights', room: 'Room Type', meals: 'Meals',
        issuer: 'Issued By', sig: 'Authorized Signature',
        qr: 'Scan to verify',
        notes: 'Important Notes',
        footer_left: '<strong>Alyame Travel & Tourism</strong> · Electronically generated · No signature required',
        footer_right: 'ALYAME · 2026 ©',
        status_map: { confirmed:'Confirmed', pending:'Pending', cancelled:'Cancelled' },
        nights_fmt: n => `${n} ${n===1?'Night':'Nights'}`,
        notes_list: [
          'Please present this voucher together with a valid photo ID upon arrival at the hotel.',
          'Standard check-in 14:00 · Check-out 12:00 (subject to hotel policy).',
          'For some bookings, any changes or cancellations must be made at least 48 hours before check-in.',
          'This voucher is non-transferable and is valid only for the named guest.',
          'Some bookings are non-refundable once the voucher has been issued.'
        ]
      }
    }
  };

  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function addDays(iso,n){ const d=new Date(iso); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
  function fmtDate(iso, locale){
    if(!iso) return '—';
    try {
      const d = new Date(iso);
      // Force Western (Latin) digits even in Arabic mode
      const tag = locale === 'ar' ? 'ar-EG-u-nu-latn' : 'en-GB';
      return d.toLocaleDateString(tag, { day:'2-digit', month:'long', year:'numeric' });
    } catch(e){ return iso; }
  }
  function calcNights(ci,co){
    if(!ci||!co) return 0;
    return Math.max(1, Math.round((new Date(co)-new Date(ci))/86400000));
  }
  function genRef(){
    const y = new Date().getFullYear();
    const r = Math.floor(1000 + Math.random()*9000);
    return `MR-${y}-${r}`;
  }

  // Save current form values to store for current lang
  function saveCurrent(){
    TEXT_FIELDS.forEach(f => { store[lang][f] = $(f).value; });
    SHARED_FIELDS.forEach(f => { store.shared = store.shared || {}; store.shared[f] = $(f).value; });
  }

  // Load store values into form for given lang
  function loadForLang(l){
    TEXT_FIELDS.forEach(f => { $(f).value = (store[l] && store[l][f]) || ''; });
    if(store.shared){
      SHARED_FIELDS.forEach(f => { if(store.shared[f] != null) $(f).value = store.shared[f]; });
    }
  }

  function applyFormLang(l){
    const t = T[l];
    document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
    document.documentElement.setAttribute('lang', l);
    document.body.setAttribute('data-lang', l);
    $('ui_title').textContent = t.page_title;
    // Labels
    $('lbl_ref').textContent = t.form.ref;
    $('lbl_confirm').textContent = t.form.confirm;
    $('lbl_status').textContent = t.form.status;
    $('lbl_hotel_in').textContent = t.form.hotel;
    $('lbl_loc_in').textContent = t.form.loc;
    $('lbl_guest_in').textContent = t.form.guest;
    $('lbl_room_in').textContent = t.form.room;
    $('lbl_checkin_in').textContent = t.form.checkin;
    $('lbl_checkout_in').textContent = t.form.checkout;
    $('lbl_nights_in').textContent = t.form.nights;
    $('lbl_meals_in').textContent = t.form.meals;
    $('lbl_issuer_in').textContent = t.form.issuer;
    // Buttons
    $('btn_gen').textContent = t.form.gen;
    $('btn_print').textContent = t.form.print;
    $('btn_reset').textContent = t.form.reset;
    const installBtn = $('btnInstall');
    if(installBtn) installBtn.textContent = t.form.install;
    // Placeholders
    Object.keys(t.placeholders).forEach(k => {
      const el = $(k); if(el) el.placeholder = t.placeholders[k];
    });
    // Status select options
    $('opt_confirmed').textContent = t.status_opt.confirmed;
    $('opt_pending').textContent = t.status_opt.pending;
    $('opt_cancelled').textContent = t.status_opt.cancelled;
  }

  function setLang(l){
    if(l === lang){ return; }
    saveCurrent();
    lang = l;
    $('btnAr').classList.toggle('active', l === 'ar');
    $('btnEn').classList.toggle('active', l === 'en');
    $('doc').setAttribute('data-lang', l);
    applyFormLang(l);
    loadForLang(l);
    generate();
    try { localStorage.setItem('hotelVoucher:lang', l); } catch(e){}
  }

  function initDefaults(){
    if(!$('ref').value) $('ref').value = genRef();
    if(!$('checkin').value) $('checkin').value = todayISO();
    if(!$('checkout').value) $('checkout').value = addDays($('checkin').value || todayISO(), 3);
  }

  function generate(){
    initDefaults();
    saveCurrent();
    const t = T[lang];
    const d = t.doc;

    // Letterhead (Alyame is the primary issuer)
    $('d_watermark').textContent = 'ALYAME';
    $('d_co_name').textContent = d.co_name;
    $('d_co_sub').textContent = d.co_sub;
    $('d_partner_label').textContent = d.partner;
    $('d_stamp_co').textContent = 'ALYAME';
    $('d_stamp_sub').textContent = lang === 'ar' ? 'رسمي' : 'OFFICIAL';

    // Bilingual labels
    $('d_lbl_libya').textContent = d.libya;
    $('d_lbl_egypt').textContent = d.egypt;
    $('d_lbl_confirm').textContent = d.confirm;
    $('d_pill').textContent = d.pill;
    $('d_title').textContent = d.title;
    $('d_lbl_ref').textContent = d.ref;
    $('d_lbl_status').textContent = d.status;
    $('d_lbl_date').textContent = d.date;
    $('d_lbl_hotel').textContent = d.hotel;
    $('d_sec_guest').textContent = d.sec_guest;
    $('d_sec_booking').textContent = d.sec_booking;
    $('d_lbl_guest').textContent = d.guest;
    $('d_lbl_checkin').textContent = d.checkin;
    $('d_lbl_checkout').textContent = d.checkout;
    $('d_lbl_nights').textContent = d.nights_l;
    $('d_lbl_room').textContent = d.room;
    $('d_lbl_meals').textContent = d.meals;
    $('d_lbl_issuer').textContent = d.issuer;
    $('d_lbl_sig').textContent = d.sig;
    $('d_lbl_qr').textContent = d.qr;
    $('d_lbl_notes').textContent = d.notes;
    $('d_footer_left').innerHTML = `<strong>${d.co_name}</strong> · ` + (lang === 'ar'
      ? 'وثيقة إلكترونية لا تحتاج إلى توقيع'
      : 'Electronically generated · No signature required');
    $('d_footer_center').textContent = 'info@alyametravel.com  ·  www.alyametravel.com';
    $('d_footer_right').textContent = lang === 'ar' ? 'اليامي · 2026 ©' : 'ALYAME · 2026 ©';
    $('d_notes').innerHTML = d.notes_list.map(n => `<li>${n}</li>`).join('');

    // Dynamic values
    $('d_ref_top').textContent = $('ref').value || '—';
    $('d_confirm').textContent = $('confirm').value || '—';
    $('d_date').textContent = fmtDate(todayISO(), lang);
    $('d_hotel').textContent = $('hotel').value || '—';
    $('d_loc').textContent = $('loc').value || '—';
    $('d_guest').textContent = $('guest').value || '—';
    $('d_room').textContent = $('room').value || '—';
    $('d_meals').textContent = $('meals').value || '—';
    $('d_checkin').textContent = fmtDate($('checkin').value, lang);
    $('d_checkout').textContent = fmtDate($('checkout').value, lang);

    const manualN = parseInt($('nights').value, 10);
    const autoN = calcNights($('checkin').value, $('checkout').value);
    const n = (manualN && manualN > 0) ? manualN : autoN;
    $('d_nights').textContent = n ? d.nights_fmt(n) : '—';

    const issuerName = $('issuer').value || '';
    $('d_issuer').textContent = issuerName || '—';
    $('d_issuer_email').textContent = STAFF_EMAIL[issuerName] || '';

    // Status
    const badge = $('d_status');
    const statusVal = $('status').value;
    const statusCls = { confirmed: '', pending: ' status-pending', cancelled: ' status-cancelled' };
    badge.textContent = d.status_map[statusVal] || d.status_map.confirmed;
    badge.className = 'status-badge' + (statusCls[statusVal] || '');

    // QR (always uses raw data, language-agnostic)
    const qrPayload = JSON.stringify({
      ref: $('ref').value,
      confirm: $('confirm').value,
      guest_ar: store.ar.guest || '',
      guest_en: store.en.guest || '',
      hotel_ar: store.ar.hotel || '',
      hotel_en: store.en.hotel || '',
      in: $('checkin').value,
      out: $('checkout').value,
      status: statusVal
    });
    new QRious({
      element: $('qr'), value: qrPayload, size: 200,
      foreground: '#0f172a', background: '#ffffff', padding: 0
    });

    // Persist
    try {
      localStorage.setItem('hotelVoucher:store', JSON.stringify(store));
    } catch(e){}
  }

  function resetForm(){
    document.querySelectorAll('input').forEach(i => i.value='');
    $('status').selectedIndex = 0;
    store.ar = {}; store.en = {}; store.shared = {};
    initDefaults();
    generate();
  }

  // Load saved
  try {
    const saved = JSON.parse(localStorage.getItem('hotelVoucher:store') || '{}');
    if(saved.ar) store.ar = saved.ar;
    if(saved.en) store.en = saved.en;
    if(saved.shared) store.shared = saved.shared;
    const savedLang = localStorage.getItem('hotelVoucher:lang');
    if(savedLang === 'en' || savedLang === 'ar') lang = savedLang;
  } catch(e){}

  // Init UI
  applyFormLang(lang);
  loadForLang(lang);
  $('doc').setAttribute('data-lang', lang);
  $('btnAr').classList.toggle('active', lang === 'ar');
  $('btnEn').classList.toggle('active', lang === 'en');

  $('ref').addEventListener('dblclick', () => { $('ref').value = genRef(); });
  function syncNights(){
    const n = calcNights($('checkin').value, $('checkout').value);
    if(n) $('nights').value = n;
  }
  $('checkin').addEventListener('change', syncNights);
  $('checkout').addEventListener('change', syncNights);
  $('issuer').addEventListener('change', generate);

  generate();

  // PWA
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW:', err));
    });
  }
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = $('btnInstall');
    if(btn) btn.style.display = 'inline-block';
  });
  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    const btn = $('btnInstall');
    if(btn) btn.style.display = 'none';
  });
  function installApp(){
    if(!deferredPrompt){
      const msg = lang === 'ar'
        ? 'لتثبيت التطبيق على iPhone: افتح في Safari ثم اضغط "مشاركة" → "إضافة إلى الشاشة الرئيسية".\n\nعلى Android/الكمبيوتر: استخدم قائمة المتصفح → "تثبيت التطبيق".'
        : 'To install on iPhone: open in Safari, tap "Share" → "Add to Home Screen".\n\nOn Android / Desktop: use your browser menu → "Install App".';
      alert(msg);
      return;
    }
    deferredPrompt.prompt();
    deferredPrompt.userChoice.finally(() => { deferredPrompt = null; });
  }
</script>
</body>
</html>
